<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.M. Marklund — Author</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Caveat:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#1b2030;
  --terracotta-1:#d97a3f;
  --terracotta-2:#a8461f;
  --burgundy:#7c1f2c;
  --cream:#f4ede2;
  --cream-dim:#f4ede2cc;
  --ink:#1a1610;
  --gold:#c9a15a;
  --line:rgba(244,237,226,0.18);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--cream);
  color:var(--ink);
  font-family:'EB Garamond', serif;
}

a{text-decoration:none;color:inherit;}

/* NAV */
header.nav{
  background:var(--navy);
  color:var(--cream);
  display:flex;
  justify-content:space-between;
  padding:20px 5vw;
}

.brand{
  font-family:'Cormorant Garamond',serif;
  letter-spacing:.25em;
}

nav.links{
  display:flex;
  gap:30px;
}

/* HERO */
section.hero{
  background:linear-gradient(160deg,#e0904f,var(--terracotta-1),var(--terracotta-2));
  padding:6vw;
  display:grid;
  grid-template-columns: minmax(220px,340px) 1fr;
  gap:6vw;
  align-items:center;
}

/* FIXED COVER */
.cover-slot{
  grid-column:1;
  grid-row:1 / span 2;
  aspect-ratio:2/3;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 18px 40px rgba(0,0,0,.35);
}

.cover-slot img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* TEXT */
.hero-main{text-align:center;}

.title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.5rem,5vw,4rem);
}

.title .accent{
  display:block;
  color:var(--burgundy);
}

/* BUTTON */
.cta{
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  background:#24402b;
  color:white;
}

/* SOCIALS */
.social-row{
  display:flex;
  justify-content:center;
  gap:20px;
}
.social-row a{
  width:40px;height:40px;
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
}
.social-row svg{width:18px;height:18px;}

</style>
</head>

<body>

<header class="nav">
  <div class="brand">A.M. Marklund</div>
  <nav class="links">
	<a href="#home">Home</a>
	<a href="#about">About</a>
  </nav>
</header>

<section class="hero" id="home">

  <div class="cover-slot">
	<img src="images/honeyblade.jpg" alt="Honeyblade book cover">
  </div>

  <div class="hero-main">
	<h1 class="title">
  	HONEYBLADE
  	<span class="accent">The Honeyblade Duology</span>
	</h1>

	<p style="margin-top:20px;">
  	medieval fantasy AND romance
	</p>

	<p style="margin-top:20px;">
  	enemies to lovers · court intrigue · slow burn
	</p>

	<p style="margin-top:30px;">
  	coming July 29th, 2026
	</p>

	<a href="https://www.amazon.com/Honeyblade-Duology-Book-1-ebook/dp/B0H2BWSPKY"
   	target="_blank"
   	class="cta">
  	Pre-order on Amazon
	</a>
  </div>

</section>

<section style="background:#1b2030;color:#f4ede2;padding:60px 20px;text-align:center;" id="about">

  <h2>Contact</h2>
  <p style="margin-top:10px;">marklundbooks@gmail.com</p>

  <div class="social-row" style="margin-top:30px;">

	<a href="https://instagram.com/ammarklund" target="_blank">
  	<svg viewBox="0 0 24 24" fill="none" stroke="#f4ede2">
    	<rect x="3" y="3" width="18" height="18" rx="5"/>
    	<circle cx="12" cy="12" r="4"/>
    	<circle cx="17.2" cy="6.8" r="1"/>
  	</svg>
	</a>

	<a href="https://tiktok.com/@ammarklund" target="_blank">
  	<svg viewBox="0 0 24 24" fill="none" stroke="#f4ede2">
    	<path d="M14 3c.5 3 2.3 4.7 5 5v3c-1.9 0-3.6-.6-5-1.7V15a5 5 0 1 1-4-4.9"/>
  	</svg>
	</a>

  </div>

</section>

</body>
</html>
